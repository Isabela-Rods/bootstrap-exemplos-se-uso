<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">

</head>

<body style="background-color: beige; background-image: url(../fundo.jpg);">
    
    <!-- Email -->
   <div class="container my-5" style="padding:80px; background-color:rgb(255, 250, 250); width: 460px; border-radius: 35px;">
        <form class="custom-form">
            <!-- Campo para e-mail -->
             <h2 class="text mt-4 mb-5" style="text-align: center; color:rgb(178, 105, 246)">Login</h2>
             <label for="email" class="form-label" >E-mail</label>
           <div class="col-sm-6 mb-4" >
                <div class="input-group" style="width:300px">
                    <span class="input-group-text custom-icon"style="background-color:rgb(178, 105, 246)";>
                        <i class="bi bi-person"></i>
                    </span>
                <input type="text" class="form-control custom-input" placeholder="Digite seu email" >
            </div>
        </div>



    <!-- Senha -->
       <div class="col-sm-6 mb-3" >
        <label for="email" class="form-label" >Senha</label>
                <div class="input-group" style="width:300px">
                    <span class="input-group-text custom-icon" style="background-color:rgb(178, 105, 246);" >
                        <i class="bi bi-lock-fill"></i>
                    </span>
                <input type="password" class="form-control custom-input" placeholder="Digite sua senha" >
                
            </div>
        </div>


    <!-- Botão para entrar -->
    <button type="submit" class="btn btn-info" style="width:300px; color:white">Entrar</button>
        </form>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
